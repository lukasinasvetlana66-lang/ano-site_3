<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Origami crane body -->
  <!-- Main body -->
  <polygon points="200,80 300,220 200,200" fill="#2563EB" opacity="0.95"/>
  <polygon points="200,80 100,220 200,200" fill="#1D4ED8" opacity="0.95"/>
  <!-- Wing right -->
  <polygon points="300,220 380,160 320,260" fill="#3B82F6" opacity="0.9"/>
  <polygon points="300,220 320,260 200,200" fill="#2563EB" opacity="0.85"/>
  <!-- Wing left -->
  <polygon points="100,220 20,160 80,260" fill="#1E40AF" opacity="0.9"/>
  <polygon points="100,220 80,260 200,200" fill="#1D4ED8" opacity="0.85"/>
  <!-- Tail -->
  <polygon points="200,200 160,300 240,300" fill="#1E40AF" opacity="0.9"/>
  <!-- Head/beak -->
  <polygon points="200,80 230,30 260,80" fill="#2563EB" opacity="0.95"/>
  <polygon points="200,80 210,50 180,60" fill="#3B82F6" opacity="0.8"/>
  <!-- Body center shading -->
  <polygon points="200,80 200,200 250,150" fill="#1D4ED8" opacity="0.4"/>
</svg>
